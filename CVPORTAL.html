<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Portal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel for the Portal UI -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- html2pdf library for client-side direct PDF generation & download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }

        /* ================================
           Dark Blue, Sky Blue, White Theme
           ================================ */
        :root {
            --dark-blue: #0B1F3A;
            --deep-blue: #102A4C;
            --sky-blue: #38BDF8;
            --sky-blue-dark: #0284C7;
            --soft-sky: #E0F2FE;
            --white: #FFFFFF;
            --border-blue: #BAE6FD;
            --text-dark: #0F172A;
            --text-muted: #475569;
        }

        .theme-page {
            background: linear-gradient(135deg, #0B1F3A 0%, #102A4C 48%, #E0F2FE 100%);
            color: var(--text-dark);
        }

        .theme-login-card {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(186, 230, 253, 0.95);
            box-shadow: 0 25px 60px rgba(2, 8, 23, 0.35);
            backdrop-filter: blur(10px);
        }

        .theme-sidebar {
            background: linear-gradient(180deg, #0B1F3A 0%, #102A4C 100%);
            color: #FFFFFF;
            border-right: 1px solid rgba(56, 189, 248, 0.25);
        }

        .theme-main {
            background: linear-gradient(180deg, #F8FCFF 0%, #E0F2FE 100%);
            color: var(--text-dark);
        }

        .theme-card {
            background: var(--white);
            border: 1px solid var(--border-blue);
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        }

        .theme-section-title {
            color: var(--dark-blue);
            border-bottom: 2px solid var(--sky-blue);
            padding-bottom: 10px;
        }

        .theme-row {
            background: #F8FCFF;
            border: 1px solid #BAE6FD;
            border-radius: 14px;
        }

        .theme-label {
            color: #0B1F3A;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .theme-input {
            background: white;
            border: 1px solid #BAE6FD;
            color: #0F172A;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .theme-input:focus {
            outline: none;
            border-color: #38BDF8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
        }

        .theme-button-primary {
            background: linear-gradient(135deg, #0284C7 0%, #38BDF8 100%);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .theme-button-primary:hover {
            background: linear-gradient(135deg, #0369A1 0%, #0EA5E9 100%);
            transform: translateY(-1px);
        }

        .theme-button-dark {
            background: linear-gradient(135deg, #0B1F3A 0%, #102A4C 100%);
            color: white;
            border: 1px solid rgba(125, 211, 252, 0.35);
        }

        .theme-button-dark:hover {
            background: linear-gradient(135deg, #102A4C 0%, #16406F 100%);
        }

        .theme-button-secondary {
            background: #E0F2FE;
            color: #0B1F3A;
            border: 1px solid #7DD3FC;
            font-weight: 700;
            border-radius: 10px;
        }

        .theme-button-secondary:hover {
            background: #BAE6FD;
        }

        .theme-delete {
            color: #DC2626;
        }

        .theme-delete:hover {
            background: #FEE2E2;
            color: #B91C1C;
        }

        .theme-add-link {
            color: #0284C7;
            font-weight: 800;
        }

        .theme-add-link:hover {
            color: #0369A1;
            text-decoration: underline;
        }

        /* Optimized printing styles for A4 paper preview to strictly fit on a single page */
        @media print {
            body { background: white !important; color: black !important; }
            nav, .no-print { display: none !important; }
            main { padding: 0 !important; overflow: visible !important; height: auto !important; }
            .print-page { box-shadow: none !important; border: none !important; padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
        }
    </style>
</head>
<body id="mainBody" class="theme-page flex items-center justify-center min-h-screen font-sans text-slate-200 transition-colors duration-500">

    <div id="loginContainer" class="w-full max-w-md theme-login-card rounded-2xl p-8 transition-all duration-300 m-4">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-[#0B1F3A] tracking-wide">Professional Profile Portal</h2>
            <p class="text-slate-500 text-sm mt-1">Sign in to access your profile</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-[#0B1F3A] mb-1">Name</label>
                <input id="username" type="text" required 
                       class="w-full p-3 bg-white border border-sky-200 text-slate-900 rounded-lg focus:ring-2 focus:ring-sky-400 outline-none" 
                       placeholder="Enter your name">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-[#0B1F3A] mb-1">Password</label>
                <input id="password" type="password" required 
                       class="w-full p-3 bg-white border border-sky-200 text-slate-900 rounded-lg focus:ring-2 focus:ring-sky-400 outline-none" 
                       placeholder="••••••••">
            </div>

            <button id="submitBtn" type="submit" 
                    class="w-full theme-button-primary py-3 flex justify-center items-center rounded-lg transition-colors">
                <span>Sign In</span>
            </button>
        </form>
        
        <div id="message" class="mt-5 text-center text-sm hidden p-3 rounded-lg"></div>
    </div>

    <div id="root" class="hidden w-full h-full"></div>

    <script type="text/babel">
        window.renderCVBuilder = (userName, scriptUrl, existingProfile) => {
            
            // Vector trash icon for delete buttons
            const TrashIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5 mx-auto">
                    <path strokeLinecap="round" strokeLinejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                </svg>
            );

            // Clickable interactive 5-star rating selection component
            const InteractiveStars = ({ rating, onChange }) => {
                const [hoverRating, setHoverRating] = React.useState(null);
                
                const currentRating = hoverRating !== null ? hoverRating : (rating || 0);

                return (
                    <div className="flex items-center space-x-1">
                        {[1, 2, 3, 4, 5].map((star) => (
                            <button
                                key={star}
                                type="button"
                                onClick={() => onChange(star === rating ? 0 : star)}
                                onMouseEnter={() => setHoverRating(star)}
                                onMouseLeave={() => setHoverRating(null)}
                                className="p-1 focus:outline-none transition-transform hover:scale-110 active:scale-95"
                                title={`Set rating to ${star} stars`}
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24"
                                    width="28"
                                    height="28"
                                    fill={star <= currentRating ? "#EAB308" : "none"}
                                    stroke={star <= currentRating ? "#EAB308" : "#94A3B8"}
                                    strokeWidth={1.5}
                                    className="w-7 h-7 transition-colors duration-150"
                                >
                                    <path
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                        d="M11.48 3.499c.151-.377.725-.377.876 0l1.861 4.646 5.006.402c.415.033.582.52.282.814l-3.812 3.737.904 4.966c.074.409-.364.723-.717.514L12 18.257l-4.406 2.381c-.353.209-.79-.105-.717-.514l.904-4.966-3.812-3.737c-.3-.294-.133-.78.282-.814l5.006-.402 1.861-4.646z"
                                    />
                                </svg>
                            </button>
                        ))}
                        <span className="text-sm font-semibold ml-2 text-slate-500">{(rating || 0)}/5 Stars</span>
                    </div>
                );
            };

            // Static stars with explicit width/height to avoid disappearing inside html2canvas PDF exports
            const StaticStars = ({ rating }) => {
                return (
                    <div className="flex items-center space-x-0.5" style={{ display: 'flex' }}>
                        {[1, 2, 3, 4, 5].map((star) => (
                            <svg
                                key={star}
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                width="14"
                                height="14"
                                fill={star <= (rating || 0) ? "#EAB308" : "none"}
                                stroke={star <= (rating || 0) ? "#EAB308" : "#CBD5E1"}
                                strokeWidth={1.5}
                                style={{ display: 'inline-block', width: '14px', height: '14px' }}
                            >
                                <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    d="M11.48 3.499c.151-.377.725-.377.876 0l1.861 4.646 5.006.402c.415.033.582.52.282.814l-3.812 3.737.904 4.966c.074.409-.364.723-.717.514L12 18.257l-4.406 2.381c-.353.209-.79-.105-.717-.514l.904-4.966-3.812-3.737c-.3-.294-.133-.78.282-.814l5.006-.402 1.861-4.646z"
                                />
                            </svg>
                        ))}
                    </div>
                );
            };

            const App = () => {
                const [viewMode, setViewMode] = React.useState('edit'); // Modes: 'edit' or 'preview'
                const [isDownloading, setIsDownloading] = React.useState(false);
                
                const [data, setData] = React.useState(() => {
                    const defaults = {
                        personal: { name: userName, email: '', mobile: '', address: '', summary: '', photo: '' },
                        education: [{ id: 1, institution: '', subject: '', degree: 'SSC', cgpa: '', passingYear: '' }],
                        experience: [{ id: 1, organization: '', designation: '', start: '', end: '', durationText: '' }],
                        skills: [{ id: 1, name: '', rating: '' }],
                        extras: [{ id: 1, organization: '', designation: '', start: '', end: '', durationText: '' }],
                        achievements: [{ id: 1, title: '', year: '' }],
                        publications: [{ id: 1, header: '', link: '' }],
                        socials: [{ id: 1, platform: 'LinkedIn', link: '' }],
                        references: [{ id: 1, name: '', designation: '', contact: '', email: '' }]
                    };
                    
                    if (!existingProfile) return defaults;
                    
                    return {
                        personal: { ...defaults.personal, ...(existingProfile.personal || {}) },
                        education: Array.isArray(existingProfile.education) && existingProfile.education.length > 0 ? existingProfile.education : defaults.education,
                        experience: Array.isArray(existingProfile.experience) && existingProfile.experience.length > 0 ? existingProfile.experience : defaults.experience,
                        skills: Array.isArray(existingProfile.skills) && existingProfile.skills.length > 0 ? existingProfile.skills : defaults.skills,
                        extras: Array.isArray(existingProfile.extras) && existingProfile.extras.length > 0 ? existingProfile.extras : defaults.extras,
                        achievements: Array.isArray(existingProfile.achievements) && existingProfile.achievements.length > 0 ? existingProfile.achievements : defaults.achievements,
                        publications: Array.isArray(existingProfile.publications) && existingProfile.publications.length > 0 ? existingProfile.publications : defaults.publications,
                        socials: Array.isArray(existingProfile.socials) && existingProfile.socials.length > 0 ? existingProfile.socials : defaults.socials,
                        references: Array.isArray(existingProfile.references) && existingProfile.references.length > 0 ? existingProfile.references : defaults.references
                    };
                });
                
                const [isSaving, setIsSaving] = React.useState(false);

                const updatePersonal = (key, val) => setData(p => ({...p, personal: {...(p.personal || {}), [key]: val}}));
                
                // Downsample uploaded image dynamically using HTML Canvas to fit safely inside database cell schemas (< 10kb)
                const handlePhotoUpload = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const max_size = 150; // Web-optimized thumbnail bounding dimensions
                                let width = img.width;
                                let height = img.height;
                                if (width > height) {
                                    if (width > max_size) {
                                        height *= max_size / width;
                                        width = max_size;
                                    }
                                } else {
                                    if (height > max_size) {
                                        width *= max_size / height;
                                        height = max_size;
                                    }
                                }
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                
                                // Compress image as optimized JPG with 70% quality factor
                                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                                updatePersonal('photo', compressedBase64);
                            };
                            img.src = reader.result;
                        };
                        reader.readAsDataURL(file);
                    }
                };

                const listUpdate = (sec, id, key, val) => {
                    setData(p => {
                        const targetArray = p[sec] || [];
                        const updated = targetArray.map(item => {
                            if (item.id === id) {
                                const newItem = { ...item, [key]: val };
                                if ((sec === 'experience' || sec === 'extras') && (key === 'start' || key === 'end')) {
                                    newItem.durationText = calculateDuration(newItem.start, newItem.end);
                                }
                                return newItem;
                            }
                            return item;
                        });
                        return { ...p, [sec]: updated };
                    });
                };
                
                const add = (sec, template) => setData(p => ({
                    ...p, 
                    [sec]: [...(p[sec] || []), { id: Date.now(), ...template }]
                }));
                
                const remove = (sec, id) => setData(p => ({
                    ...p, 
                    [sec]: (p[sec] || []).filter(item => item.id !== id)
                }));

                const calculateDuration = (start, end) => {
                    if (!start) return '';
                    const startDate = new Date(start);
                    const endDate = end ? new Date(end) : new Date();
                    
                    if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) return '';
                    
                    let months = (endDate.getFullYear() - startDate.getFullYear()) * 12 + (endDate.getMonth() - startDate.getMonth());
                    if (months < 0) return '';
                    
                    const years = Math.floor(months / 12);
                    const remMonths = months % 12;
                    
                    let result = [];
                    if (years > 0) result.push(`${years} yr${years > 1 ? 's' : ''}`);
                    if (remMonths > 0 || years === 0) result.push(`${remMonths} mo${remMonths !== 1 ? 's' : ''}`);
                    
                    if (!end) result.push('(Present)');
                    return result.join(' ');
                };



                // Display month/year as short month format in CV preview only.
                // Examples: "December 2019" -> "Dec 2019", "2019-12" -> "Dec 2019".
                // This does not change the saved database value or date input value.
                const formatMonthYearShort = (value) => {
                    if (!value) return '';

                    const monthNames = {
                        january: 'Jan', jan: 'Jan',
                        february: 'Feb', feb: 'Feb',
                        march: 'Mar', mar: 'Mar',
                        april: 'Apr', apr: 'Apr',
                        may: 'May',
                        june: 'Jun', jun: 'Jun',
                        july: 'Jul', jul: 'Jul',
                        august: 'Aug', aug: 'Aug',
                        september: 'Sep', sept: 'Sep', sep: 'Sep',
                        october: 'Oct', oct: 'Oct',
                        november: 'Nov', nov: 'Nov',
                        december: 'Dec', dec: 'Dec'
                    };

                    const monthNumberMap = {
                        '01': 'Jan', '02': 'Feb', '03': 'Mar', '04': 'Apr',
                        '05': 'May', '06': 'Jun', '07': 'Jul', '08': 'Aug',
                        '09': 'Sep', '10': 'Oct', '11': 'Nov', '12': 'Dec'
                    };

                    const textValue = String(value).trim();

                    // Handles HTML month input value: YYYY-MM
                    const htmlMonthMatch = textValue.match(/^(\d{4})-(\d{2})$/);
                    if (htmlMonthMatch) {
                        const year = htmlMonthMatch[1];
                        const month = monthNumberMap[htmlMonthMatch[2]];
                        return month ? `${month} ${year}` : textValue;
                    }

                    // Handles values like "December 2019" or "Dec 2019"
                    const namedMonthMatch = textValue.match(/^([A-Za-z]+)\s+(\d{4})$/);
                    if (namedMonthMatch) {
                        const month = monthNames[namedMonthMatch[1].toLowerCase()];
                        const year = namedMonthMatch[2];
                        return month ? `${month} ${year}` : textValue;
                    }

                    return textValue;
                };


                // Reusable month selector for the form fields.
                // It displays a short readable value like "Dec 2019" while keeping the stored value as "2019-12".
                const MonthInput = ({ value, onChange }) => {
                    const pickerRef = React.useRef(null);

                    const normalizeMonthValue = (inputValue) => {
                        if (!inputValue) return '';
                        const textValue = String(inputValue).trim();

                        if (/^\d{4}-\d{2}$/.test(textValue)) return textValue;

                        const monthLookup = {
                            january: '01', jan: '01',
                            february: '02', feb: '02',
                            march: '03', mar: '03',
                            april: '04', apr: '04',
                            may: '05',
                            june: '06', jun: '06',
                            july: '07', jul: '07',
                            august: '08', aug: '08',
                            september: '09', sept: '09', sep: '09',
                            october: '10', oct: '10',
                            november: '11', nov: '11',
                            december: '12', dec: '12'
                        };

                        const namedMonthMatch = textValue.match(/^([A-Za-z]+)\s+(\d{4})$/);
                        if (namedMonthMatch) {
                            const month = monthLookup[namedMonthMatch[1].toLowerCase()];
                            const year = namedMonthMatch[2];
                            return month ? `${year}-${month}` : '';
                        }

                        return '';
                    };

                    const openPicker = () => {
                        const picker = pickerRef.current;
                        if (!picker) return;

                        if (picker.showPicker) {
                            picker.showPicker();
                        } else {
                            picker.focus();
                            picker.click();
                        }
                    };

                    return (
                        <div className="relative w-full">
                            <input
                                type="text"
                                readOnly
                                value={formatMonthYearShort(value)}
                                placeholder="Dec 2019"
                                onClick={openPicker}
                                className="p-2 theme-input w-full pr-9 text-[13px] cursor-pointer"
                            />

                            <button
                                type="button"
                                onClick={openPicker}
                                className="absolute right-2 top-1/2 -translate-y-1/2 text-[#0B1F3A] hover:text-sky-500"
                                title="Select month"
                            >
                                📅
                            </button>

                            <input
                                ref={pickerRef}
                                type="month"
                                value={normalizeMonthValue(value)}
                                onChange={(e) => onChange(e.target.value)}
                                className="absolute inset-0 opacity-0 pointer-events-none"
                                tabIndex="-1"
                            />
                        </div>
                    );
                };


                const handleSave = async () => {
                    setIsSaving(true);
                    try {
                        const payload = { ...data, loginName: userName };
                        const res = await fetch(scriptUrl, {
                            method: "POST",
                            body: JSON.stringify(payload)
                        });
                        const result = await res.json();
                        if(result.status === "success") {
                            alert("Profile Saved to Database Successfully!");
                        } else {
                            alert("Error saving: " + result.message);
                        }
                    } catch(err) {
                        alert("Profile submitted. Please verify update inside your spreadsheet dashboard.");
                    }
                    setIsSaving(false);
                };

                // WORKAROUND 1: Direct File compilation with html2pdf (Sized strictly for Single A4 page boundaries)
                const downloadDirectPDF = () => {
                    setIsDownloading(true);
                    const element = document.getElementById('cv-preview-content');
                    const options = {
                        margin:       [0.2, 0.25, 0.2, 0.25], // Tighter margins to ensure single-page fits
                        filename:     `${data.personal?.name || userName}_CV.pdf`,
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true },
                        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
                    };
                    
                    html2pdf().set(options).from(element).save().then(() => {
                        setIsDownloading(false);
                    }).catch(err => {
                        console.error("PDF download failed:", err);
                        setIsDownloading(false);
                        alert("Failed to compile file directly. Please use the Print button as an alternative.");
                    });
                };

                // WORKAROUND 2: Out of Iframe compilation via safe clean tab opening (Bypasses Sandbox blocks)
                const triggerSafePrint = () => {
                    const printContent = document.getElementById('cv-preview-content').innerHTML;
                    const printWindow = window.open('', '_blank');
                    
                    if (!printWindow) {
                        alert("Popup blocked! Please allow popups for this portal page to open print view.");
                        return;
                    }
                    
                    printWindow.document.write(`
                        <html>
                            <head>
                                <title>CV - ${data.personal?.name || userName}</title>
                                <script src="https://cdn.tailwindcss.com"><\/script>
                                <style>
                                    body { background: white !important; color: black !important; padding: 25px; font-family: sans-serif; }
                                    @media print {
                                        body { padding: 0; }
                                        .print-page { box-shadow: none !important; border: none !important; padding: 0 !important; }
                                    }
                                </style>
                            </head>
                            <body>
                                <div class="max-w-4xl mx-auto p-4 print-page">
                                    ${printContent}
                                </div>
                                <script>
                                    window.onload = function() {
                                        setTimeout(function() {
                                            window.print();
                                            window.close();
                                        }, 400);
                                    };
                                <\/script>
                            </body>
                        </html>
                    `);
                    printWindow.document.close();
                };

                return (
                    <div className="flex h-screen w-full overflow-hidden fade-enter-active">
                        {/* Sidebar (With editor toggles & print button) */}
                        <nav className="w-64 theme-sidebar p-6 flex flex-col justify-between shadow-xl z-10 shrink-0 no-print">
                            <div className="space-y-6">
                                <div>
                                    <h1 className="text-2xl font-bold mb-2 text-sky-300">CV Portal</h1>
                                    <p className="text-sm text-slate-400 border-b border-slate-700 pb-4">Logged in: <span className="text-white font-medium">{userName}</span></p>
                                </div>
                                
                                {/* View Toggles */}
                                <div className="space-y-2">
                                    <button 
                                        onClick={() => setViewMode('edit')} 
                                        className={`w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 flex items-center gap-3 ${viewMode === 'edit' ? 'bg-sky-500 text-white shadow-lg' : 'hover:bg-sky-900/40 text-sky-100'}`}
                                    >

                                    {/* Section 9: References */}

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-0.5 gap-x-4 text-[11px] mt-2 text-slate-600">
                                                <div className="flex items-center gap-1.5">
                                                    <span className="font-semibold text-slate-800">Email:</span> {data.personal?.email || 'N/A'}
                                                </div>
                                                <div className="flex items-center gap-1.5">
                                                    <span className="font-semibold text-slate-700">Mobile:</span> {data.personal?.mobile || 'N/A'}
                                                </div>
                                            </div>
                                        </div>
                                        {/* Dynamic CV Profile Photo Display Block - Scaled tightly */}
                                        {data.personal?.photo && (
                                            <div className="w-20 h-20 md:w-24 md:h-24 rounded-lg overflow-hidden border border-slate-200 shrink-0 shadow-sm self-center">
                                                <img src={data.personal.photo} className="w-full h-full object-cover" alt="Profile Avatar" />
                                            </div>
                                        )}
                                    </div>

                                    {/* Section 1: Summary */}
                                    {data.personal?.summary && (
                                        <div className="mb-4">
                                            <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">Professional Summary</h3>
                                            <p className="text-slate-700 text-xs leading-normal">{data.personal.summary}</p>
                                        </div>
                                    )}

                                    {/* Main Body - Dual Column Layout */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                        {/* Left Preview Column: Skills, Socials, Publications, References */}
                                        <div className="md:col-span-1 space-y-5 border-r border-slate-100 pr-0 md:pr-4">
                                            {/* Technical Skills */}
                                            <div>
                                                <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-2">Technical Skills</h3>
                                                <div className="space-y-1.5">
                                                    {data.skills?.map((skill, index) => skill.name && (
                                                        <div key={index} className="text-xs">
                                                            <div className="font-semibold text-slate-800 mb-0.5">{skill.name}</div>
                                                            <StaticStars rating={skill.rating} />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Social Media */}
                                            <div>
                                                <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-2">Social Channels</h3>
                                                <div className="space-y-1 text-xs text-slate-700">
                                                    {data.socials?.map((soc, index) => soc.platform && (
                                                        <div key={index} className="overflow-hidden text-ellipsis whitespace-nowrap">
                                                            <span className="font-semibold text-slate-800">{soc.platform}: </span>
                                                            <a href={soc.link} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">{soc.link || 'N/A'}</a>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Publications (Shifted here - after Social Channels & before References!) */}
                                            {data.publications?.some(pub => pub.header) && (
                                                <div>
                                                    <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-2">Publications</h3>
                                                    <div className="space-y-2">
                                                        {data.publications?.map((pub, index) => pub.header && (
                                                            <div key={index} className="text-xs leading-normal">
                                                                <div className="font-semibold text-slate-800">{pub.header}</div>
                                                                {pub.link && <a href={pub.link} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline text-[11px] break-all block">{pub.link}</a>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* References */}
                                            <div>
                                                <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-2">References</h3>
                                                <div className="space-y-3">
                                                    {data.references?.map((ref, index) => ref.name && (
                                                        <div key={index} className="text-xs text-slate-600 leading-tight">
                                                            <div className="font-bold text-slate-800">{ref.name}</div>
                                                            <div>{ref.designation}</div>
                                                            {ref.contact && <div>Mob: {ref.contact}</div>}
                                                            {ref.email && <div className="text-[11px] text-slate-500 overflow-hidden text-ellipsis">{ref.email}</div>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Right Preview Column: Experience, Education, Extracurriculars, Achievements */}
                                        <div className="md:col-span-2 space-y-5">
                                            {/* Professional Experience */}
                                            <div>
                                                <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-3">Professional Experience</h3>
                                                <div className="space-y-3">
                                                    {data.experience?.map((exp, index) => exp.organization && (
                                                        <div key={index} className="text-xs">
                                                            <div className="flex justify-between items-start font-bold text-slate-800">
                                                                <span className="text-[13px]">{exp.designation}</span>
                                                                <span className="text-slate-500 text-right text-[11px]">{formatMonthYearShort(exp.start)} — {exp.end ? formatMonthYearShort(exp.end) : 'Present'}</span>
                                                            </div>
                                                            <div className="text-blue-600 font-semibold mb-0.5">{exp.organization}</div>
                                                            {exp.durationText && <div className="text-[10px] text-slate-400 font-medium">Calculated duration: {exp.durationText}</div>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Education */}
                                            <div>
                                                <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-3">Education Details</h3>
                                                <div className="space-y-2.5">
                                                    {data.education?.map((edu, index) => edu.institution && (
                                                        <div key={index} className="text-xs">
                                                            <div className="flex justify-between font-bold text-slate-800">
                                                                <span className="text-[13px]">
                                                                    {edu.degree}{edu.subject ? ` in ${edu.subject}` : ''}
                                                                </span>
                                                                <span className="text-slate-500 text-[11px]">{edu.passingYear}</span>
                                                            </div>
                                                            <div className="text-slate-600 mb-0.5">{edu.institution}</div>
                                                            {edu.cgpa && <div className="text-slate-500 text-[11px]">CGPA: {edu.cgpa}</div>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Extracurricular activities */}
                                            <div>
                                                <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-3">Extracurricular Activities</h3>
                                                <div className="space-y-2.5">
                                                    {data.extras?.map((act, index) => act.organization && (
                                                        <div key={index} className="text-xs">
                                                            <div className="flex justify-between font-bold text-slate-800">
                                                                <span className="text-[13px]">{act.designation}</span>
                                                                <span className="text-slate-500 text-[11px]">{formatMonthYearShort(act.start)} — {act.end ? formatMonthYearShort(act.end) : 'Present'}</span>
                                                            </div>
                                                            <div className="text-slate-600 mb-0.5">{act.organization}</div>
                                                            {act.durationText && <div className="text-[10px] text-slate-400 font-medium">Calculated duration: {act.durationText}</div>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Achievements and Awards */}
                                            {data.achievements?.some(act => act.title) && (
                                                <div>
                                                    <h3 className="text-xs font-bold text-blue-600 uppercase tracking-wider border-b pb-0.5 mb-3">Achievements and Awards</h3>
                                                    <div className="space-y-2">
                                                        {data.achievements?.map((act, index) => act.title && (
                                                            <div key={index} className="text-xs">
                                                                <div className="flex justify-between font-bold text-slate-800">
                                                                    <span className="text-[13px]">{act.title}</span>
                                                                    <span className="text-slate-500 text-[11px]">{act.year}</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                );
            };
            
            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        }
    </script>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxObmmSIqHR_ZUQhOY1yPNvLyXF3aqvWjHDJepSc8v15ncMTG4gG8fXTq8UpqiB2rQj/exec"; 
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Verifying...`;
            msg.classList.add('hidden');

            try {
                const fetchUrl = `${SCRIPT_URL}?v=${new Date().getTime()}`;
                const response = await fetch(fetchUrl);
                const result = await response.json();
                
                if (result.status === "success") {
                    const isValid = result.data.find(r => 
                        r.name.trim().toLowerCase() === user.toLowerCase() && 
                        r.password.trim() === pass
                    );
                    
                    if (isValid) {
                        const existingProfile = result.profiles ? result.profiles.find(p => p.loginName && p.loginName.toLowerCase() === user.toLowerCase()) : null;
                        
                        document.getElementById('loginContainer').classList.add('hidden');
                        document.getElementById('mainBody').className = "bg-white overflow-hidden"; 
                        document.getElementById('root').classList.remove('hidden');
                        
                        window.renderCVBuilder(user, SCRIPT_URL, existingProfile);
                    } else {
                        showError("Invalid Name or Password.");
                    }
                 } else {
                    showError("Server Error: " + result.message);
                }
            } catch (err) {
                showError("Connection failed. Check your Web App URL status.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Sign In</span>`;
            }
        });

        function showError(text) {
            const msg = document.getElementById('message');
            msg.innerText = text;
            msg.className = "mt-5 text-center text-sm p-3 rounded-lg bg-red-500/10 text-red-400 border border-red-500/20";
            msg.classList.remove('hidden');
        }
    </script>
</body>
</html>
